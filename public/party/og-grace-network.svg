<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="indigoGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3730A3" />
      <stop offset="100%" stop-color="#B45309" />
    </linearGradient>
  </defs>

  <!-- Background: warm off-white like the site -->
  <rect width="1200" height="630" fill="#FAFAF8" />

  <!-- Subtle border -->
  <rect x="24" y="24" width="1152" height="582" rx="2" fill="none" stroke="#E5E3DE" stroke-width="1" />

  <!-- Seven Stars Constellation Logo -->
  <g transform="translate(600, 190)">
    <!-- Connecting lines: center to satellites -->
    <line x1="0" y1="0" x2="0" y2="-54" stroke="#3730A3" stroke-width="1.5" opacity="0.35"/>
    <line x1="0" y1="0" x2="47" y2="-27" stroke="#3730A3" stroke-width="1.5" opacity="0.35"/>
    <line x1="0" y1="0" x2="47" y2="27" stroke="#3730A3" stroke-width="1.5" opacity="0.35"/>
    <line x1="0" y1="0" x2="0" y2="54" stroke="#B45309" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="0" x2="-47" y2="27" stroke="#B45309" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="0" x2="-47" y2="-27" stroke="#3730A3" stroke-width="1.5" opacity="0.35"/>
    <!-- Outer ring connections -->
    <line x1="0" y1="-54" x2="47" y2="-27" stroke="#3730A3" stroke-width="1" opacity="0.15"/>
    <line x1="47" y1="-27" x2="47" y2="27" stroke="#3730A3" stroke-width="1" opacity="0.15"/>
    <line x1="47" y1="27" x2="0" y2="54" stroke="#6366F1" stroke-width="1" opacity="0.15"/>
    <line x1="0" y1="54" x2="-47" y2="27" stroke="#B45309" stroke-width="1" opacity="0.15"/>
    <line x1="-47" y1="27" x2="-47" y2="-27" stroke="#6366F1" stroke-width="1" opacity="0.15"/>
    <line x1="-47" y1="-27" x2="0" y2="-54" stroke="#3730A3" stroke-width="1" opacity="0.15"/>
    <!-- Satellite nodes -->
    <circle cx="0" cy="-54" r="6" fill="#3730A3"/>
    <circle cx="47" cy="-27" r="6" fill="#3730A3"/>
    <circle cx="47" cy="27" r="6" fill="#6366F1"/>
    <circle cx="0" cy="54" r="6" fill="#B45309"/>
    <circle cx="-47" cy="27" r="6" fill="#B45309"/>
    <circle cx="-47" cy="-27" r="6" fill="#6366F1"/>
    <!-- Central node -->
    <circle cx="0" cy="0" r="13" fill="#3730A3"/>
  </g>

  <!-- Title -->
  <text x="600" y="330" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="#1A1A1A" letter-spacing="-1">
    The Grace Network
  </text>

  <!-- Divider -->
  <line x1="480" y1="360" x2="720" y2="360" stroke="url(#indigoGold)" stroke-width="1.5" opacity="0.5" />

  <!-- Tagline -->
  <text x="600" y="400" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="400" fill="#555555" letter-spacing="0.5">
    The movement that builds what it believes.
  </text>

  <!-- Pillars hint -->
  <text x="600" y="460" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#3730A3" letter-spacing="3" text-transform="uppercase">
    SAFETY  ·  FLOURISHING  ·  TRANSPARENCY  ·  SOVEREIGNTY  ·  SCIENCE  ·  ALIGNMENT  ·  ABUNDANCE
  </text>

  <!-- URL -->
  <text x="600" y="570" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#888888" letter-spacing="1">
    grace-network.vercel.app
  </text>
</svg>
